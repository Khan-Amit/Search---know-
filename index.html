<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Search---know-™</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <!-- ===== TOP DARK BLUE BAND ===== -->
    <div class="top-band">
        <div class="brand">
            <span class="logo">🔍</span>
            <span class="name">Search---know- <small>™</small></span>
        </div>
        <div class="eye-icon" onclick="window.location.href='members.html'">👁️</div>
    </div>

    <!-- ===== SEARCH BLOCK ===== -->
    <div class="search-block">
        <div class="search-row">
            <input type="text" id="queryInput" placeholder="Search..." autofocus>
            <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
        </div>
        <div class="search-icons">
            <button class="icon-btn active" data-type="web"><i class="fas fa-globe"></i> Web</button>
            <button class="icon-btn" data-type="images"><i class="fas fa-image"></i> Images</button>
            <button class="icon-btn" data-type="news"><i class="fas fa-newspaper"></i> News</button>
            <button class="icon-btn" data-type="videos"><i class="fas fa-video"></i> Videos</button>
            <button class="icon-btn" data-type="weather"><i class="fas fa-cloud-sun"></i> Weather</button>
        </div>
    </div>

    <!-- ===== WEATHER MINI ===== -->
    <div class="weather-mini" id="weatherWidget">
        <div class="left">
            <span class="temp" id="weatherTemp">--°C</span>
            <div>
                <div class="condition" id="weatherCondition">Loading...</div>
                <div class="location" id="weatherLocation">--</div>
            </div>
        </div>
        <div class="right">
            <span>💧 <span id="weatherHumidity">--</span>%</span>
            <span>💨 <span id="weatherWind">--</span></span>
        </div>
    </div>

    <!-- ===== APP SECTION ===== -->
    <div class="app-section">
        <div class="section-header">
            <h2><i class="fas fa-th"></i> My Apps</h2>
            <button class="add-btn" id="addAppBtn"><i class="fas fa-plus"></i> Add</button>
        </div>
        <div class="app-grid" id="appGrid"></div>
    </div>

    <!-- ===== RESULTS ===== -->
    <div id="loader" class="loader"><div class="spinner"></div><p style="margin-top:4px;font-size:.7rem;">Searching...</p></div>
    <div id="results"><div class="info-message">🔍 Type and search</div></div>

    <!-- ===== VISITOR COUNTER ===== -->
    <div class="visitor-counter" id="visitorCounter">
        <div class="stat">👁️ <strong id="totalVisitors">...</strong> total</div>
        <div class="stat"><span class="online-dot"></span> <strong id="onlineNow">...</strong> online</div>
        <div class="stat">🌍 <span id="topCountries">Loading...</span></div>
        <button class="refresh-btn" onclick="refreshStats()">↻</button>
    </div>

    <!-- ===== FOOTER ===== -->
    <div class="footer">
        <span>© 2026 Search---know-™ • Mardukh system ®</span>
        <span class="open-source">Open source • <a href="#" onclick="alert('Improve on GitHub!')">Improve this page</a></span>
    </div>

    <!-- ===== ADMIN TOGGLE ===== -->
    <button class="admin-toggle" onclick="toggleAdmin()">⚙️</button>

    <!-- ===== ADMIN PANEL ===== -->
    <div id="adminPanel" class="admin-panel">
        <h3>🛡️ Manage Apps</h3>
        <div class="add-app-form">
            <input type="text" id="adminAppName" placeholder="App name">
            <input type="text" id="adminAppUrl" placeholder="URL">
            <input type="text" id="adminAppIcon" placeholder="Icon" value="fa-link">
            <button id="adminAddBtn"><i class="fas fa-plus"></i> Add</button>
        </div>
        <div id="adminAppList"></div>
        <div class="admin-status" id="adminStatus"></div>
    </div>

</div>

<script src="script.js"></script>
<script>
    // ============================================================
    // APP MANAGEMENT
    // ============================================================
    const APPS_KEY = 'searchknow_apps';
    
    const DEFAULT_APPS = [
        { id: 'web', label: 'Web', icon: 'fa-globe', url: null },
        { id: 'images', label: 'Images', icon: 'fa-image', url: null },
        { id: 'news', label: 'News', icon: 'fa-newspaper', url: null },
        { id: 'videos', label: 'Videos', icon: 'fa-video', url: null },
        { id: 'weather', label: 'Weather', icon: 'fa-cloud-sun', url: null },
        { id: 'enkomos', label: 'ENKOMOS', icon: 'fa-satellite', url: 'https://khan-amit.github.io/ENKOMOS-_WEB' },
        { id: 'meetingluck', label: 'Meeting Luck', icon: 'fa-crown', url: 'https://khan-amit.github.io/What-Is--seliim/' },
        { id: 'kongming', label: 'Kongming', icon: 'fa-chess-king', url: 'https://khan-amit.github.io/Kongming-V1' }
    ];

    function loadApps() {
        try {
            const stored = localStorage.getItem(APPS_KEY);
            if (stored) {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length > 0) return parsed;
            }
        } catch (e) {}
        return JSON.parse(JSON.stringify(DEFAULT_APPS));
    }

    function saveApps(apps) {
        localStorage.setItem(APPS_KEY, JSON.stringify(apps));
    }

    let appList = loadApps();

    // ============================================================
    // RENDER APPS
    // ============================================================
    const appGrid = document.getElementById('appGrid');

    function renderApps() {
        appGrid.innerHTML = '';
        if (!appList || appList.length === 0) {
            appGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#999;font-size:.7rem;padding:10px 0;">No apps. Tap + to add.</div>';
            return;
        }
        appList.forEach(app => {
            const div = document.createElement('div');
            div.className = 'app-item';
            const icon = document.createElement('span');
            icon.className = 'app-icon';
            icon.innerHTML = `<i class="fas ${app.icon}"></i>`;
            div.appendChild(icon);
            const label = document.createElement('span');
            label.className = 'app-label';
            label.textContent = app.label;
            div.appendChild(label);
            if (app.url) {
                const badge = document.createElement('span');
                badge.className = 'app-badge';
                badge.textContent = 'APP';
                div.appendChild(badge);
            }
            div.onclick = () => {
                if (app.url) {
                    window.open(app.url, '_blank');
                } else {
                    document.getElementById('queryInput').value = app.label;
                    document.getElementById('searchBtn').click();
                }
            };
            appGrid.appendChild(div);
        });
        
        // Add button
        const addDiv = document.createElement('div');
        addDiv.className = 'app-item add-new';
        addDiv.innerHTML = `<span style="font-size:1.6rem;">+</span><span style="font-size:.45rem;color:#999;margin-top:2px;">Add</span>`;
        addDiv.onclick = () => { document.getElementById('addAppBtn').click(); };
        appGrid.appendChild(addDiv);
    }

    // ============================================================
    // ADMIN PANEL
    // ============================================================
    const adminPanel = document.getElementById('adminPanel');
    const adminAppList = document.getElementById('adminAppList');

    function renderAdminList() {
        if (!appList || appList.length === 0) {
            adminAppList.innerHTML = '<div style="color:#999;font-size:.7rem;padding:6px 0;">No apps.</div>';
            return;
        }
        adminAppList.innerHTML = appList.map(app => `
            <div class="admin-app-item">
                <div class="info">
                    <span class="icon"><i class="fas ${app.icon}"></i></span>
                    <span class="name">${app.label}</span>
                </div>
                <button class="remove-btn" onclick="removeApp('${app.id}')">×</button>
            </div>
        `).join('');
    }

    function removeApp(id) {
        if (confirm('Remove this app?')) {
            appList = appList.filter(a => a.id !== id);
            saveApps(appList);
            renderApps();
            renderAdminList();
            document.getElementById('adminStatus').textContent = '✅ Removed!';
            setTimeout(() => document.getElementById('adminStatus').textContent = '', 2000);
        }
    }

    function toggleAdmin() {
        adminPanel.classList.toggle('visible');
        if (adminPanel.classList.contains('visible')) renderAdminList();
    }

    document.getElementById('adminToggleBtn')?.addEventListener('click', toggleAdmin);

    document.getElementById('adminAddBtn').addEventListener('click', () => {
        const name = document.getElementById('adminAppName').value.trim();
        const url = document.getElementById('adminAppUrl').value.trim();
        const icon = document.getElementById('adminAppIcon').value.trim() || 'fa-link';
        if (!name) {
            document.getElementById('adminStatus').textContent = '⚠️ Enter a name.';
            return;
        }
        const newApp = { id: 'app_' + Date.now(), label: name, icon: icon, url: url || null };
        appList.push(newApp);
        saveApps(appList);
        renderApps();
        renderAdminList();
        document.getElementById('adminAppName').value = '';
        document.getElementById('adminAppUrl').value = '';
        document.getElementById('adminAppIcon').value = 'fa-link';
        document.getElementById('adminStatus').textContent = '✅ "' + name + '" added!';
        setTimeout(() => document.getElementById('adminStatus').textContent = '', 2000);
    });

    document.getElementById('addAppBtn').addEventListener('click', () => {
        adminPanel.classList.add('visible');
        renderAdminList();
        document.getElementById('adminAppName').focus();
    });

    // ============================================================
    // SEARCH TABS
    // ============================================================
    let currentType = 'web';

    document.querySelectorAll('.search-icons .icon-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.search-icons .icon-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentType = this.dataset.type;
            const q = document.getElementById('queryInput').value.trim();
            if (q) performSearch(q, currentType);
        });
    });

    // ============================================================
    // SEARCH FUNCTIONS
    // ============================================================
    async function performSearch(query, type) {
        if (!query) {
            document.getElementById('results').innerHTML = '<div class="info-message">🔍 Type something</div>';
            return;
        }
        const loader = document.getElementById('loader');
        const resultsDiv = document.getElementById('results');
        loader.style.display = 'block';
        resultsDiv.innerHTML = '';

        try {
            let html = '';
            switch(type) {
                case 'web': html = await webSearch(query); break;
                case 'images': html = await imageSearch(query); break;
                case 'news': html = await newsSearch(query); break;
                case 'videos': html = await videoSearch(query); break;
                case 'weather': html = await weatherSearch(query); break;
                default: html = await webSearch(query);
            }
            resultsDiv.innerHTML = html || '<div class="info-message">No results.</div>';
        } catch (e) {
            resultsDiv.innerHTML = `<div class="info-message" style="color:#c0392b;">⚠️ Error</div>`;
        } finally {
            loader.style.display = 'none';
        }
    }

    async function webSearch(query) {
        try {
            const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data.title && data.extract) {
                return `
                    <div class="result-card">
                        <h3><a href="https://en.wikipedia.org/wiki/${encodeURIComponent(data.title.replace(/ /g,'_'))}" target="_blank">${data.title}</a></h3>
                        <div class="url">Wikipedia</div>
                        <div class="snippet">${data.extract.substring(0, 200)}...</div>
                        <div class="badge">Web</div>
                    </div>
                `;
            }
            return '<div class="info-message">No web results.</div>';
        } catch (e) {
            return '<div class="info-message">No web results.</div>';
        }
    }

    async function imageSearch(query) {
        const KEY = 'YcXaodW8DLZoAreLYwLPYoTZuX2DrSNEhmVg4o0B9N8rLUh8NmIqNbmf';
        try {
            const res = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=9`, {
                headers: { Authorization: KEY }
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (!data.photos || data.photos.length === 0) return '<div class="info-message">No images.</div>';
            return `<div class="image-results">${data.photos.map(p => `
                <img src="${p.src.medium}" alt="${p.alt || query}" onclick="window.open('${p.url}','_blank')">
            `).join('')}</div>`;
        } catch (e) {
            return '<div class="info-message">Image search unavailable.</div>';
        }
    }

    async function newsSearch(query) {
        // Mock news for demo
        return `
            <div class="news-results">
                <div class="news-card"><div class="title">${query} - Latest Updates</div><div class="source">News Source • Today</div></div>
                <div class="news-card"><div class="title">${query} - Breaking News</div><div class="source">News Source • Today</div></div>
                <div class="news-card"><div class="title">${query} - In-Depth Analysis</div><div class="source">News Source • Today</div></div>
            </div>
        `;
    }

    async function videoSearch(query) {
        const KEY = 'YcXaodW8DLZoAreLYwLPYoTZuX2DrSNEhmVg4o0B9N8rLUh8NmIqNbmf';
        try {
            const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=6`, {
                headers: { Authorization: KEY }
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (!data.videos || data.videos.length === 0) return '<div class="info-message">No videos.</div>';
            return `<div class="video-results">${data.videos.map(v => `
                <div class="video-card" onclick="window.open('${v.url}','_blank')">
                    <div class="thumb"><img src="${v.image}" alt=""><i class="fas fa-play-circle"></i></div>
                    <div class="info"><div class="title">${v.user?.name || 'Video'}</div><div class="channel">Pexels</div></div>
                </div>
            `).join('')}</div>`;
        } catch (e) {
            return '<div class="info-message">Video search unavailable.</div>';
        }
    }

    async function weatherSearch(query) {
        try {
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}`);
            const geoData = await geoRes.json();
            if (!geoData.results || geoData.results.length === 0) return '<div class="info-message">Location not found.</div>';
            const loc = geoData.results[0];
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current_weather=true`);
            const wData = await wRes.json();
            if (wData.current_weather) {
                const temp = wData.current_weather.temperature;
                const code = wData.current_weather.weathercode;
                const conditions = {0:'☀️ Clear',1:'⛅ Partly',2:'☁️ Cloudy',3:'☁️ Overcast',51:'🌧️ Drizzle',61:'🌧️ Rain',71:'🌨️ Snow',95:'⛈️ Storm'};
                return `
                    <div class="result-card">
                        <h3>${loc.name}, ${loc.country}</h3>
                        <div style="font-size:1.8rem;font-weight:300;color:#0a1628;">${Math.round(temp)}°C</div>
                        <div class="snippet">${conditions[code] || '🌤️'}</div>
                        <div class="badge">Weather</div>
                    </div>
                `;
            }
            return '<div class="info-message">Weather unavailable.</div>';
        } catch (e) {
            return '<div class="info-message">Weather unavailable.</div>';
        }
    }

    // ============================================================
    // WEATHER WIDGET
    // ============================================================
    async function getWeather() {
        try {
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            const city = ipData.city || 'Singapore';
            const country = ipData.country_name || 'Singapore';
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}`);
            const geoData = await geoRes.json();
            let lat = 1.3521, lon = 103.8198;
            if (geoData.results && geoData.results.length > 0) {
                lat = geoData.results[0].latitude;
                lon = geoData.results[0].longitude;
            }
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const wData = await wRes.json();
            if (wData.current_weather) {
                document.getElementById('weatherTemp').textContent = Math.round(wData.current_weather.temperature) + '°C';
                document.getElementById('weatherLocation').textContent = city + ', ' + country;
                document.getElementById('weatherWind').textContent = Math.round(wData.current_weather.windspeed) + ' km/h';
                const code = wData.current_weather.weathercode;
                const conditions = {0:'☀️ Clear',1:'⛅ Partly',2:'☁️ Cloudy',3:'☁️ Overcast',51:'🌧️ Drizzle',61:'🌧️ Rain',71:'🌨️ Snow',95:'⛈️ Storm'};
                document.getElementById('weatherCondition').textContent = conditions[code] || '🌤️';
                // Humidity from hourly (approximate)
                try {
                    const hRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=relative_humidity_2m&forecast_days=1`);
                    const hData = await hRes.json();
                    if (hData.hourly && hData.hourly.relative_humidity_2m) {
                        document.getElementById('weatherHumidity').textContent = hData.hourly.relative_humidity_2m[0] || '--';
                    }
                } catch (e) {}
            }
        } catch (e) { console.warn('Weather failed:', e); }
    }

    // ============================================================
    // SEARCH EVENT
    // ============================================================
    document.getElementById('searchBtn').addEventListener('click', () => {
        const q = document.getElementById('queryInput').value.trim();
        if (q) performSearch(q, currentType);
    });

    document.getElementById('queryInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });

    // ============================================================
    // VISITOR TRACKING (from script.js)
    // ============================================================
    // script.js handles visitor tracking

    // ============================================================
    // INIT
    // ============================================================
    renderApps();
    getWeather();
    console.log('🔍 Search---know-™ mobile ready.');
</script>
</body>
</html>
